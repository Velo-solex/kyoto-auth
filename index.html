<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KYOTO — Spotify Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Coiny&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
    --bg:#EFD8D4;
    --surface:#F6E6E2;
    --surface-2:#F1DCD8;
    --text:#2A1714;
    --text-dim:#7E6763;
    --accent:#B13C27;
    --accent-soft:#D19488;
    --olive:#8A8B63;
    --warn:#C28A1F;
    --shadow:0 10px 30px rgba(0,0,0,.06);
    --shadow-soft:0 5px 18px rgba(0,0,0,.045);
}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:24px 16px 48px}
.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;user-select:none}
.container{width:100%;max-width:480px}

/* Wordmark */
.wordmark{text-align:center;margin-bottom:18px}
.wordmark-text{font-family:'Coiny',cursive;font-size:2.8rem;color:var(--accent);letter-spacing:.02em;line-height:1}
.wordmark-sub{font-size:.78rem;color:var(--text-dim);margin-top:8px;text-transform:uppercase;
    letter-spacing:.18em;font-weight:500}

/* Card */
.card{background:var(--surface);border-radius:32px;padding:26px;box-shadow:var(--shadow)}

/* Status pill */
.status-badge{display:inline-flex;align-items:center;gap:8px;font-size:.74rem;font-weight:600;
    text-transform:uppercase;letter-spacing:.1em;padding:6px 14px;border-radius:999px;margin-bottom:14px}
.status-badge.success{background:rgba(138,139,99,.18);color:var(--olive)}
.status-badge.error{background:rgba(177,60,39,.12);color:var(--accent)}
.status-badge.waiting{background:rgba(194,138,31,.15);color:var(--warn)}
.badge-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.success .badge-dot{background:var(--olive)}
.error .badge-dot{background:var(--accent)}
.waiting .badge-dot{background:var(--warn);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

h2{font-size:1.4rem;font-weight:700;letter-spacing:-0.03em;line-height:1.2;margin-bottom:8px}
.subtitle{font-size:.9rem;color:var(--text-dim);line-height:1.6;margin-bottom:20px;font-weight:400}
.subtitle strong{color:var(--text);font-weight:600}

/* Code box */
.code-label{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;
    color:var(--text-dim);margin-bottom:8px}
.code-box{background:#fff;border-radius:18px;padding:14px 16px;font-family:'Courier New',monospace;
    font-size:.78rem;color:var(--accent);word-break:break-all;line-height:1.55;margin-bottom:14px;
    user-select:all;cursor:text;box-shadow:var(--shadow-soft)}
.copy-btn{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:20px;
    font-family:'Poppins',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;
    transition:transform .12s;margin-bottom:22px;display:flex;align-items:center;justify-content:center;
    gap:8px;box-shadow:var(--shadow-soft)}
.copy-btn:active{transform:scale(.97)}
.copy-btn.copied{background:var(--olive)}
.copy-btn .material-symbols-rounded{font-size:20px}

.divider{border:none;height:1px;background:rgba(126,103,99,.18);margin:0 0 18px}

/* Steps */
.steps-label{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;
    color:var(--text-dim);margin-bottom:12px}
.steps{display:flex;flex-direction:column;gap:10px}
.step{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:#fff;border-radius:18px;
    box-shadow:var(--shadow-soft)}
.step-num{width:24px;height:24px;background:var(--accent);color:#fff;font-size:.74rem;font-weight:700;
    border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:.86rem;color:var(--text-dim);line-height:1.55;font-weight:400;padding-top:3px}
.step-text strong{color:var(--text);font-weight:600}

/* Error / waiting */
.error-detail{background:#fff;border-radius:18px;padding:14px 16px;font-size:.85rem;color:var(--accent);
    font-family:'Courier New',monospace;margin-bottom:18px;word-break:break-all;line-height:1.5;
    box-shadow:var(--shadow-soft)}
.error-detail-msg{margin-top:6px;font-family:'Poppins',sans-serif;color:var(--text-dim);font-size:.8rem}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:.9rem;color:var(--accent);
    font-weight:600;cursor:pointer;background:none;border:none;font-family:'Poppins',sans-serif;padding:0;
    transition:opacity .15s}
.back-btn:active{opacity:.7}

.waiting-row{display:flex;align-items:center;gap:12px;padding:16px;background:#fff;border-radius:18px;
    font-size:.88rem;color:var(--text-dim);font-weight:500;box-shadow:var(--shadow-soft)}
.spinner{width:18px;height:18px;border:2px solid var(--surface-2);border-top-color:var(--accent);
    border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.footer{text-align:center;margin-top:20px;font-size:.72rem;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:.15em;font-weight:500}
</style>
</head>
<body>
<div class="container">
  <div class="wordmark">
    <div class="wordmark-text">KYOTO</div>
    <div class="wordmark-sub">Spotify Connect</div>
  </div>
  <div class="card" id="card"></div>
  <div class="footer">kyoto player &mdash; account setup</div>
</div>
<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const error  = params.get('error');
  const errDesc = params.get('error_description');
  const card   = document.getElementById('card');

  const iconCopy = '<span class="material-symbols-rounded">content_copy</span>';
  const iconDone = '<span class="material-symbols-rounded">check</span>';

  function escapeHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
                  .replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function copyCode(c){
    navigator.clipboard.writeText(c).then(()=>{
      const btn = document.getElementById('copy-btn');
      btn.classList.add('copied');
      btn.innerHTML = iconDone + ' Copied to clipboard';
      setTimeout(()=>{
        btn.classList.remove('copied');
        btn.innerHTML = iconCopy + ' Copy authorisation code';
      },2500);
    }).catch(()=>{
      const box = document.getElementById('code-display');
      const r = document.createRange(); r.selectNode(box);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(r);
    });
  }

  if (code) {
    const safeCode = escapeHtml(code);
    card.innerHTML = `
      <div class="status-badge success"><span class="badge-dot"></span> Authorised</div>
      <h2>Connected to Spotify</h2>
      <p class="subtitle">Copy the code below and paste it into the <strong>KYOTO setup page</strong> at <strong>http://10.10.10.10/setup</strong></p>
      <div class="code-label">Authorisation code</div>
      <div class="code-box" id="code-display">${safeCode}</div>
      <button class="copy-btn" id="copy-btn" onclick="window._copy('${safeCode.replace(/'/g, "\\'")}')">${iconCopy} Copy authorisation code</button>
      <div class="divider"></div>
      <div class="steps-label">Next steps</div>
      <div class="steps">
        <div class="step"><span class="step-num">1</span><span class="step-text">Switch to the <strong>KYOTO setup tab</strong> in your browser</span></div>
        <div class="step"><span class="step-num">2</span><span class="step-text">Paste the code into the <strong>Authorisation Code</strong> field</span></div>
        <div class="step"><span class="step-num">3</span><span class="step-text">Tap <strong>Connect</strong> &mdash; tokens are stored securely on the device</span></div>
        <div class="step"><span class="step-num">4</span><span class="step-text">You won't need to do this again &mdash; tokens refresh automatically</span></div>
      </div>`;
    window._copy = copyCode;
  } else if (error) {
    const safeErr = escapeHtml(error);
    const safeDesc = errDesc ? escapeHtml(errDesc.replace(/\+/g, ' ')) : '';
    card.innerHTML = `
      <div class="status-badge error"><span class="badge-dot"></span> Failed</div>
      <h2>Authorisation failed</h2>
      <p class="subtitle">Spotify returned an error. Please go back and try again.</p>
      <div class="error-detail">
        ${safeErr}
        ${safeDesc ? `<div class="error-detail-msg">${safeDesc}</div>` : ''}
      </div>
      <button class="back-btn" onclick="history.back()">&larr; Go back</button>`;
  } else {
    card.innerHTML = `
      <div class="status-badge waiting"><span class="badge-dot"></span> Waiting</div>
      <h2>Waiting for Spotify</h2>
      <p class="subtitle">Complete the authorisation in the Spotify window.<br>This page will receive the code automatically.</p>
      <div class="waiting-row"><div class="spinner"></div>Listening for callback…</div>`;
  }
})();
</script>
</body>
</html>
